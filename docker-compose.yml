services:
  postgres:
    image: postgres:16
    container_name: alpha8-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: alpha8
      POSTGRES_PASSWORD: alpha8_dev
      POSTGRES_DB: alpha8
    ports:
      - '5432:5432'
    volumes:
      - alpha8_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U alpha8' ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: alpha8-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - alpha8_redis:/data
    healthcheck:
      test: [ 'CMD', 'redis-cli', 'ping' ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  alpha8_pgdata:
  alpha8_redis:
